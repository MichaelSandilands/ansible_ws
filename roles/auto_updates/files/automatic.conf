[commands]
# 'default' installs all updates. 'security' would only install security patches.
upgrade_type = default
# 0 ensures the update runs immediately when the timer triggers.
random_sleep = 0
# Allows 60 seconds for network stack to initialize.
network_latency_signal = 60
# Downloads the RPMs to the local cache.
download_updates = yes
# THE CRITICAL STEP: Actually installs the downloaded packages.
apply_updates = yes
# Prevents unexpected reboots while you are working.
reboot = never

[emitters]
# Sends the result of the update to the system journal (viewable via journalctl).
emit_via = stdio

[base]
# Sets the detail level of the logs.
debuglevel = 1
